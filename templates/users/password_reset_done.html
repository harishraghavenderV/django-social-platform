<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | ConnectSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-deep: #060b18;
            --card-bg: rgba(20, 30, 58, 0.55);
            --border: rgba(99, 102, 241, 0.18);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-primary: #f1f5f9;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }
        .bg-mesh {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,.18), transparent 60%),
                radial-gradient(ellipse 70% 50% at 80% 70%, rgba(236,72,153,.12), transparent 60%),
                radial-gradient(ellipse 60% 45% at 50% 50%, rgba(56,189,248,.08), transparent 60%);
            animation: meshShift 12s ease-in-out infinite alternate;
        }
        @keyframes meshShift {
            0%   { filter: hue-rotate(0deg); transform: scale(1); }
            100% { filter: hue-rotate(25deg); transform: scale(1.08); }
        }
        .orb {
            position: fixed; border-radius: 50%; filter: blur(80px); opacity: .35;
            animation: float 18s ease-in-out infinite alternate; z-index: 0;
        }
        .orb-1 { width: 420px; height: 420px; background: var(--accent); top: -10%; left: -8%; animation-duration: 20s; }
        .orb-2 { width: 340px; height: 340px; background: #ec4899; bottom: -8%; right: -6%; animation-delay: 4s; animation-duration: 16s; }
        .orb-3 { width: 220px; height: 220px; background: #38bdf8; top: 50%; left: 60%; animation-delay: 8s; }
        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(30px, -20px) scale(1.05); }
            100% { transform: translate(-20px, 15px) scale(.95); }
        }
        .login-card {
            position: relative; z-index: 1; width: 100%; max-width: 440px;
            background: var(--card-bg); backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6); border: 1px solid var(--border);
            border-radius: 24px; padding: 2.75rem 2.5rem 2.25rem;
            box-shadow: 0 8px 32px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
            animation: cardIn .7s cubic-bezier(.22,1,.36,1) forwards; opacity: 0; transform: translateY(24px);
            text-align: center;
        }
        @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
        .brand { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: 2rem; }
        .brand i { font-size: 1.7rem; color: var(--accent); }
        .brand span { font-weight: 700; font-size: 1.5rem; letter-spacing: -.5px; }
        .btn-login {
            display: block; width: 100%; padding: .82rem; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #818cf8); color: #fff; font-family: inherit;
            font-weight: 600; font-size: 1rem; cursor: pointer; transition: transform .2s, box-shadow .3s; margin-top: .5rem;
            text-decoration: none; text-align: center;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 24px var(--accent-glow); }
        .btn-login:active { transform: translateY(0); }
        @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem; margin: 1rem; } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-card">
        <div class="brand">
            <i class="bi bi-grid-fill"></i>
            <span>ConnectSphere</span>
        </div>
        <div style="font-size: 3.5rem; color: var(--accent); margin-bottom: 1rem;">
            <i class="bi bi-envelope-check-fill"></i>
        </div>
        <h4 class="fw-bold mb-2 text-light" style="margin-bottom: .75rem; font-size: 1.25rem;">Reset Link Sent</h4>
        <p style="color: var(--text-muted); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem;">
            We have emailed you instructions for resetting your password. If an account exists with the email you entered, you should receive it shortly.
        </p>
        <a href="{% url 'login' %}" class="btn-login">Return to Login</a>
    </div>
</body>
</html>
