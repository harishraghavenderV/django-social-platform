{% extends 'base.html' %}

{% block title %}Edit Post | ConnectSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-pencil-square me-2" style="color: var(--accent-color);"></i>Edit Post</h5>
            <form method="POST" action="{% url 'post_edit' pk=post.id %}">
                {% csrf_token %}
                <div class="mb-3">
                    <textarea class="form-control" name="content" rows="5" placeholder="Update your post...">{{ post.content }}</textarea>
                </div>
                {% if post.image %}
                    <div class="mb-3">
                        <label class="form-label text-secondary-custom">Current image:</label>
                        <img src="{{ post.image.url }}" class="img-fluid rounded" style="max-height: 200px;" alt="Post image">
                    </div>
                {% endif %}
                <div class="d-flex justify-content-between">
                    <a href="{% url 'post_detail' pk=post.id %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
